# .github/workflows/deploy-dev.yml
#
# Project 3 - HA 3-Tier Web App - Dev Deployment
#
# Two triggers:
# 1. Push to dev branch - runs validation only (no AWS resources created)
# 2. Manual trigger (workflow_dispatch) - actually deploys or destroys

name: Deploy to Dev (3-Tier App)

on:
  push:
    branches:
      - dev
    paths:
      - 'cloudformation/**'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      action:
        description: 'deploy = create/update stack | destroy = delete stack'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy

jobs:

  validate:
    name: Validate CloudFormation Template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Install cfn-lint
        run: pip install cfn-lint

      # W1011 = warning about using Secrets Manager instead of parameters for passwords
      # We suppress it here because this is a portfolio project using GitHub Secrets.
      # In a production project you would use Secrets Manager as W1011 suggests.
      - name: Lint CloudFormation template
        run: |
          cfn-lint cloudformation/three-tier.yaml --ignore-checks W1011
          echo "Lint passed - no template errors found."

      - name: Validate template against AWS
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/three-tier.yaml
          echo "AWS validation passed."

  deploy:
    name: Deploy Stack to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Deploy CloudFormation stack to dev
        run: |
          aws cloudformation deploy \
            --template-file cloudformation/three-tier.yaml \
            --stack-name ha-webapp-dev \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ProjectName=ha-webapp-dev \
              KeyPairName=${{ secrets.EC2_KEY_PAIR_NAME }} \
              DBPassword=${{ secrets.DB_PASSWORD }} \
            --no-fail-on-empty-changeset

      - name: Print ALB URL
        run: |
          echo "Dev stack deployed successfully."
          aws cloudformation describe-stacks \
            --stack-name ha-webapp-dev \
            --region ${{ secrets.AWS_REGION }} \
            --query "Stacks[0].Outputs[?OutputKey=='ALBDNSName'].OutputValue" \
            --output text

  destroy:
    name: Destroy Dev Stack
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Delete dev stack
        run: |
          echo "Deleting stack ha-webapp-dev..."
          aws cloudformation delete-stack \
            --stack-name ha-webapp-dev \
            --region ${{ secrets.AWS_REGION }}

          echo "Waiting for deletion to complete (takes 5-10 minutes)..."
          aws cloudformation wait stack-delete-complete \
            --stack-name ha-webapp-dev \
            --region ${{ secrets.AWS_REGION }}

          echo "Stack deleted. All resources and charges stopped."
